name: Multi-Job-Dependency
env:
  APP_NAME: myapp
on:
  workflow_dispatch:

jobs:
  Build:
    env:
      ENVIRONMENT: staging

    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Builing the app
        run: echo "Building the app"

  Test:
    runs-on: ubuntu-latest
    needs: [Build]
    steps:
      - name: Running the test
        run: echo "Running tests"

      - name: Set env variable
        run: VERSION=1.0.0 >> ${GITHUB_OUTPUT}

  Deploy:
    runs-on: ubuntu-latest
    needs: [Test]
    steps:
      - name: Running the test
        run: echo "Deploying"

      - name: Print env variables"
        run: |
          echo "App name is"
          ${APP_NAME}
          echo "ENVIRONMENT is"
          ${ENVIRONMENT}
          echo "version is"
          ${GITHUB_OUTPUT}
