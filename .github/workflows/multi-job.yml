name: Multi-Job-Dependency

on:
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Builing the app
        run: echo "Building the app"

  Test:
    runs-on: ubuntu-latest
    needs: [Build]
    steps:
      - name: Running the test
        run: echo "Running tests"

  Deploy:
    runs-on: ubuntu-latest
    needs: [Test]
    steps:
      - name: Running the test
        run: echo "Deploying"
