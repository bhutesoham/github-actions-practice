name: reusable-actions
on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      environment: # Key name for the input
        description: "Environment to run against"
        required: true
        default: "staging"
        type: string
jobs:
  reusable-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Building app for environment
        run: echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"

      - name: Print docker token
        run: echo "Docker token is ${{ secrets.MY_SECRET_MESSAGE }}"
