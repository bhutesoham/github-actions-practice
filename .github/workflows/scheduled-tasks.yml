name: Scheduled Tasks

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 02:30 UTC
    - cron: "30 2 * * 1" #min hrs dayofmonth month dayofweek
    # Every 6 hours
    - cron: "0 */6 * * *"

jobs:
  run-scheduled-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Print triggered schedule
        run: |
          echo "Workflow triggered by schedule: ${{ github.event.schedule }}"

      - name: Health check (HTTP request)
        run: |
          URL="https://google.com"

          echo "Checking $URL..."
          STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" $URL)

          echo "Response code: $STATUS_CODE"

          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Health check failed!"
            exit 1
          fi

          echo "Health check passed!"
