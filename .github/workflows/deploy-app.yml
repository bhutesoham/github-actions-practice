name: Deploy flask app

on:
  workflow_dispatch:

jobs:
  deploy:
    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
      DOCKER_TAG: ${{ github.event.workflow_run.head_sha }}
    runs-on: self-hosted
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose (optional, usually pre-installed on ubuntu-latest runners)
        uses: docker/setup-compose-action@v2

      - name: deploy with docker compose
        run: docker compose down && docker compose build --no-cache && docker compose -f docker-compose.yml up -d --build
