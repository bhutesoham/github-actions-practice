# This will deploy the safe tested app to prod server
name: deploy-to-server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
      DOCKER_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Copy docker compose file
        uses: actions/checkout@v4

      - name: Execute SSH commands on prod EC2 & create app folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Starting Deployment"
            sudo apt-get update && sudo apt-get install -y docker.io docker-compose-v2
            sudo usermod -aG docker $USER && newgrp docker
            mkdir -p devops

      - name: Copy docker compose file to EC2 prod
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml # Comma-separated files/folders
          target: ~/devops # Remote destination path

      - name: Execute SSH commands on prod EC2 & run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Running App"
            export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
            export DOCKER_TAG=${{ github.sha }}
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ vars.DOCKERHUB_USER }}  --password-stdin
            cd ~/devops 
            docker compose down && docker compose build --no-cache && docker compose -f docker-compose.yml up -d --build
