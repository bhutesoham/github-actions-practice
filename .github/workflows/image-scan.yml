# uses trivy image scanner for CVEs
name: Image scanner

on:
  workflow_call:

jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub PAT
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy Scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: $ {{ vars.DOCERHUB_USER }}/github-actions-app:${{ github.sha }}
          severity: "CRITICAL"
          exit-code: "1"
