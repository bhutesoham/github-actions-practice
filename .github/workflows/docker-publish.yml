name: build-&-push

on:
  push:

jobs:
  Build-image-for-CI:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set short commit SHA
        run: echo "DOCKER_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build the docker image
        run: |
          docker build -t ${{ vars.DOCKERHUB_USER }}/flaskapp-ga-actions:$DOCKER_TAG .
          docker build -t ${{ vars.DOCKERHUB_USER }}/flaskapp-ga-actions:latest .

      - name: Login to Docker Hub PAT
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        continue-on-error: false
        run: |
          docker push ${{ vars.DOCKERHUB_USER }}/flaskapp-ga-actions:${DOCKER_TAG}
          docker push ${{ vars.DOCKERHUB_USER }}/flaskapp-ga-actions:latest
