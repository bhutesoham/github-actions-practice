name: build-&-push

on:
  push:
    branches: [main]

jobs:
  runs-on: ubuntu-latest

  steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub PAT
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push to Docker Hub
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ vars. DOCKERHUB_USER }}/repo:latest
          ${{ vars.DOCKERHUB_USER }}/flaskapp-ga-actions:cut -c 1-7 ${{ github.sha }}
