<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevSecOps Demo Deployment</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        color: #e5e7eb;
      }

      .container {
        text-align: center;
        padding: 2.5rem;
        max-width: 720px;
      }

      h1 {
        font-size: 2.7rem;
        margin-bottom: 0.6rem;
        background: linear-gradient(90deg, #00d2ff, #7b2ff7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtitle {
        opacity: 0.8;
        margin-bottom: 1.5rem;
      }

      .badge {
        display: inline-block;
        padding: 0.4rem 1.3rem;
        border-radius: 999px;
        border: 1px solid #7b2ff7;
        color: #c4b5fd;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
        margin-bottom: 2rem;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1.8rem;
        font-size: 0.9rem;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 10px #22c55e;
      }

      .cards {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 1.6rem 2rem;
        min-width: 160px;
        transition: all 0.25s ease;
      }

      .card:hover {
        transform: translateY(-6px);
        border-color: #7b2ff7;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
      }

      .card span {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #9ca3af;
        margin-bottom: 0.4rem;
      }

      .card strong {
        font-size: 1.25rem;
        color: #f9fafb;
      }

      .footer {
        margin-top: 2.5rem;
        font-size: 0.8rem;
        opacity: 0.6;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>DevSecOps Demo</h1>
      <p class="subtitle">Automated CI/CD Deployment</p>

      <div class="badge">Josh Batch 10</div>

      <div class="status">
        <div class="dot"></div>
        <span>Application Running</span>
      </div>

      <div class="cards">
        <div class="card">
          <span>Framework</span>
          <strong>Flask 3.1</strong>
        </div>

        <div class="card">
          <span>Runtime</span>
          <strong>Python 3.14</strong>
        </div>

        <div class="card">
          <span>Container</span>
          <strong>Docker</strong>
        </div>

        <div class="card">
          <span>Deploy</span>
          <strong>AWS ECS</strong>
        </div>
      </div>

      <div class="footer">
        Deployed via CI/CD Pipeline • GitHub Actions • DevSecOps Project
      </div>
    </div>
  </body>
</html>
